<div class="game-over-container">
  <h1 class="title">{{ reasonText() }}</h1>

  <div class="scores-panel">
    <table class="scores-table">
      <thead>
        <tr>
          <th>#</th>
          <th>PLAYER</th>
          <th>SCORE</th>
          <th>KILLS</th>
        </tr>
      </thead>
      <tbody>
        @for (player of finalScores(); track player.playerId; let i = $index) {
          <tr [class.winner]="i === 0" [class.me]="player.playerId === ws.playerId()">
            <td class="rank">{{ i + 1 }}</td>
            <td>{{ player.name }}</td>
            <td class="score">{{ player.score }}</td>
            <td class="kills">{{ player.kills }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="actions">
    <button (click)="returnToLobby()" class="btn btn-primary">RETURN TO LOBBY</button>
  </div>
</div>
